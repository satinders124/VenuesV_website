<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Set your password — Venues V</title>
  <link rel="icon" type="image/png" href="/icon.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:#080a0e;color:#eef0f4;font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    .wrap{width:100%;max-width:470px}.brand{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:32px}.brand img{height:40px;border-radius:10px}.brand span{font-size:20px;font-weight:800}
    .card{background:#0f1218;border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:34px}.title{font-size:25px;font-weight:900;letter-spacing:-.5px;margin-bottom:9px}.sub{font-size:14px;color:#8b96a8;line-height:1.65;margin-bottom:25px}.field{margin-bottom:15px}.field label{display:block;font-size:11px;font-weight:700;color:#8b96a8;letter-spacing:.6px;text-transform:uppercase;margin-bottom:7px}.field input{width:100%;padding:13px 14px;border:1px solid rgba(255,255,255,.1);border-radius:10px;background:#161b24;color:#eef0f4;font:inherit;outline:none}.field input:focus{border-color:#00c896}.btn{width:100%;border:0;border-radius:10px;background:#00c896;color:#06100d;padding:14px;font:800 14px Inter,-apple-system,sans-serif;cursor:pointer}.btn:disabled{opacity:.55;cursor:not-allowed}.notice{display:none;margin:0 0 17px;border-radius:10px;padding:12px 14px;font-size:13px;line-height:1.5}.notice.error{background:rgba(242,78,110,.1);border:1px solid rgba(242,78,110,.25);color:#ff9aac}.notice.success{background:rgba(0,200,150,.1);border:1px solid rgba(0,200,150,.25);color:#55e8bd}.footer{margin-top:20px;text-align:center;color:#657187;font-size:12px;line-height:1.6}.footer a{color:#00c896;text-decoration:none}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="brand"><img src="/icon.png" alt="Venues V"/><span>Venues V</span></div>
    <section class="card">
      <h1 class="title">Set your password</h1>
      <p class="sub">You have been invited to join a Venues V venue team. Create a password to activate your account.</p>
      <div id="error" class="notice error" role="alert"></div>
      <div id="success" class="notice success" role="status"></div>
      <form id="passwordForm">
        <div class="field"><label for="password">New password</label><input id="password" type="password" minlength="8" autocomplete="new-password" placeholder="At least 8 characters" required/></div>
        <div class="field"><label for="confirmPassword">Confirm password</label><input id="confirmPassword" type="password" minlength="8" autocomplete="new-password" placeholder="Re-enter password" required/></div>
        <button id="submit" class="btn" type="submit" disabled>Checking invitation…</button>
      </form>
      <p class="footer">After saving, open the Venues V app and sign in with your email and new password.<br/><a href="mailto:hello@venuesv.com">Need help?</a></p>
    </section>
  </main>
  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.109.0/dist/umd/supabase.js"></script>
  <script defer src="/js/supabase-config.js"></script>
  <script defer src="/js/accept-invite.js"></script>
</body>
</html>
